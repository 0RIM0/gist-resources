<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Page</title>
	<style>
		:root {
			--outer-spacing: 40px;
			--inner-spacing: 40px;
			--max-width: 800px;
		}

		body {
			display: flow-root;
			min-height: 100vh;
			background-color: #484848;
			margin: 0;
			padding: var(--outer-spacing);
			box-sizing: border-box;
		}

		.paper {
			background-color: white;
			justify-self: center;
			width: 100%;
			max-width: var(--max-width);
			min-height: calc(100vh - 2 * var(--outer-spacing));
			padding: var(--inner-spacing);
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			box-sizing: border-box;
		}

		h1 {
			text-align: center;
			border-bottom: 2px solid #eee;
			padding-bottom: 10px;
			margin-top: 0;
			font-size: 24px;
		}

		h2 {
			font-size: 20px;
		}

		p {
			line-height: 1.6;
			text-align: justify;
		}
	</style>
</head>

<body>
	<div class="paper">{CONTENTS}</div>
</body>

</html>
